<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yzz Foods</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="text-gray-600 bg-gray-100 font-sans">

    <div class="grid md:grid-cols-4">

        <!-- NAV -->
        <div class="md:col-span-1 bg-white shadow-md">
            <nav>
                <div>
                    <h1 class="font-bold uppercase p-6 border-b">
                        <a href="#" class="text-green-500 text-xl">Yzz Foods</a>
                    </h1>
                </div>

                <ul class="p-6 space-y-4">
                    <li>
                        <a href="#" class="hover:text-green-500">Home</a>
                        <svg class ="w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
                        </svg>

                    </li>
                    <li>
                        <a href="#" class="hover:text-green-500">About</a>
                        <svg class ="w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z" />
                        </svg>

                    </li>
                    <li>
                        <a href="#" class="hover:text-green-500">Contact</a>
                        <svg class ="w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>

                    </li>
                </ul>
            </nav>
        </div>

        <!-- MAIN CONTENT -->
        <main class="px-6 py-6 md:col-span-3">

            <!-- TOP RIGHT -->
            <div class="flex justify-center md:justify-end mb-6">
                <a href="#" class="btn text-blue-500 border-gray-200 border-2 rounded-s-md">Login</a>
                <a href="#" class="btn text-gray-500 ml-4 border-gray-200 border-2 rounded-e-md">Sign up</a>
            </div>

            <!-- HEADER -->
            <header>
                <h2 class="text-gray-700 text-4xl md:text-6xl font-semibold">Recipes</h2>
                <h3 class="text-xl md:text-2xl mt-2">For the Peeps</h3>
            </header>

            <!-- LATEST RECIPES -->
            <div>
                <h4 class="font-bold mt-12 pb-4 border-b border-red-200">
                    Latest Recipes
                </h4>

                <div class="mt-8 grid sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

                    <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition">
                        <img src="assets/Img/stew.jpeg" class="w-full h-40 object-cover" alt="Stew">
                        <div class="p-4">
                            <h5 class="font-bold text-lg">5 Bean Chilli Stew</h5>
                            <p class="text-sm text-gray-500 mt-1">Recipe by the Beast</p>
                        </div>
                        <div class="px-4 pb-4">
                            <span class="inline-flex items-center gap-1 text-sm text-gray-700">
                                <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                                </svg>
                                25 min
                            </span>
                        </div>
                    </div>

                    <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition">
                        <img src="assets/Img/Curry.jpeg" class="w-full h-40 object-cover" alt="Curry">
                        <div class="p-4">
                            <h5 class="font-bold text-lg">Meat Curry</h5>
                            <p class="text-sm text-gray-500 mt-1">Recipe by the Beast</p>
                        </div>
                        <div class="px-4 pb-4">
                            <span class="inline-flex items-center gap-1 text-sm text-gray-700">
                                <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                                </svg>
                                25 min
                            </span>
                        </div>
                    </div>

                    <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition">
                        <img src="assets/Img/noodles.jpeg" class="w-full h-40 object-cover" alt="Noodles">
                        <div class="p-4">
                            <h5 class="font-bold text-lg">Veg Noodles</h5>
                            <p class="text-sm text-gray-500 mt-1">Recipe by the Beast</p>
                        </div>
                        <div class="px-4 pb-4">
                            <span class="inline-flex items-center gap-1 text-sm text-gray-700">
                                <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                                </svg>
                                25 min
                            </span>
                        </div>

                    </div>

                </div>

                <!-- POPULAR -->
                <h4 class="font-light mt-12 pb-4 border-b border-red-200">
                    Popular Recipes
                </h4>

                <div class="mt-8 text-gray-500">
                    More recipes coming soon...
                </div>

                <!-- LOAD MORE -->
                <div class="flex justify-center mt-10">
                    <button class="btn bg-gray-200 px-6 py-2 rounded-full hover:bg-gray-300 transition">
                        Load more
                    </button>
                </div>
            </div>

        </main>
    </div>

</body>

</html>
